name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Verify file structure
        run: python3 scripts/verify.py

      - name: Lint
        run: python3 -m ruff check .

      - name: Unit tests
        run: |
          PYTHONPATH=src:. python3 -m pytest -q

      - name: Golden evals
        run: |
          PYTHONPATH=src python3 -m orbital_mission_compiler.eval_runner

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa https://github.com/open-policy-agent/opa/releases/download/v1.15.1/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: OPA smoke
        run: |
          PYTHONPATH=src bash scripts/opa_smoke.sh configs/mission_plans/sample_gpu_cpu_fallback.yaml

      - name: Argo smoke (Python sanity only)
        run: |
          PYTHONPATH=src bash scripts/argo_smoke.sh configs/mission_plans/sample_gpu_cpu_fallback.yaml
