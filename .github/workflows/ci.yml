name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Verify file structure
        run: python3 scripts/verify.py

      - name: Lint
        run: python3 -m ruff check .

      - name: Unit tests
        run: |
          PYTHONPATH=src:. python3 -m pytest -q

      - name: Golden evals
        run: |
          PYTHONPATH=src python3 -m orbital_mission_compiler.eval_runner

      - name: Install OPA
        run: |
          set -euo pipefail
          OPA_VERSION="v1.15.1"
          OPA_URL="https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          CHECKSUMS_URL="https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/checksums.txt"
          mkdir -p "$HOME/.local/bin"
          curl -fSL -o "$HOME/.local/bin/opa" "$OPA_URL"
          curl -fSL -o /tmp/opa_checksums.txt "$CHECKSUMS_URL"
          EXPECTED=$(grep "opa_linux_amd64_static" /tmp/opa_checksums.txt | awk '{print $1}')
          echo "${EXPECTED}  $HOME/.local/bin/opa" | sha256sum -c -
          chmod +x "$HOME/.local/bin/opa"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/opa" version

      - name: OPA smoke
        run: |
          PYTHONPATH=src bash scripts/opa_smoke.sh configs/mission_plans/sample_gpu_cpu_fallback.yaml

      - name: Argo smoke (Python sanity only)
        run: |
          PYTHONPATH=src bash scripts/argo_smoke.sh configs/mission_plans/sample_gpu_cpu_fallback.yaml
