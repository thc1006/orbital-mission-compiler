name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src:.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPA_VERSION: v1.15.1

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify file structure
        run: python3 scripts/verify.py

      - name: Lint
        run: python3 -m ruff check .

      - name: Type check
        run: python3 -m mypy src/orbital_mission_compiler

      - name: Unit tests with coverage
        run: |
          python3 -m pytest -q --cov=orbital_mission_compiler --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Golden evals
        run: python3 -m orbital_mission_compiler.eval_runner

      - name: Cache OPA binary
        uses: actions/cache@v4
        id: opa-cache
        with:
          path: ~/.local/bin/opa
          key: opa-${{ env.OPA_VERSION }}-linux-amd64

      - name: Install OPA
        if: steps.opa-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          mkdir -p "$HOME/.local/bin"
          OPA_BASE_URL="https://openpolicyagent.org/downloads/${OPA_VERSION}"
          curl -fSL -o "$TMP_DIR/opa_linux_amd64_static" \
            "${OPA_BASE_URL}/opa_linux_amd64_static"
          curl -fSL -o "$TMP_DIR/opa_linux_amd64_static.sha256" \
            "${OPA_BASE_URL}/opa_linux_amd64_static.sha256"
          (
            cd "$TMP_DIR"
            sha256sum -c "opa_linux_amd64_static.sha256"
          )
          install -m 0755 "$TMP_DIR/opa_linux_amd64_static" "$HOME/.local/bin/opa"
          chmod +x "$HOME/.local/bin/opa"

      - name: Verify OPA checksum
        run: |
          set -euo pipefail
          OPA_BASE_URL="https://openpolicyagent.org/downloads/${OPA_VERSION}"
          EXPECTED_SHA="$(curl -fsSL "${OPA_BASE_URL}/opa_linux_amd64_static.sha256" | awk '{print $1}')"
          ACTUAL_SHA="$(sha256sum "$HOME/.local/bin/opa" | awk '{print $1}')"
          test -n "$EXPECTED_SHA"
          test "$EXPECTED_SHA" = "$ACTUAL_SHA"

      - name: Add OPA to PATH and verify
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/opa" version

      - name: OPA smoke (all plans)
        run: |
          for plan in configs/mission_plans/*.yaml; do
            bash scripts/opa_smoke.sh "$plan"
          done

      - name: Argo smoke (Python sanity only)
        run: |
          for plan in configs/mission_plans/*.yaml; do
            bash scripts/argo_smoke.sh "$plan"
          done
