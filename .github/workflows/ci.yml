name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src:.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPA_VERSION: v1.15.1

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify file structure
        run: python3 scripts/verify.py

      - name: Lint
        run: python3 -m ruff check .

      - name: Unit tests with coverage
        run: |
          python3 -m pytest -q --cov=orbital_mission_compiler --cov-report=term-missing

      - name: Golden evals
        run: python3 -m orbital_mission_compiler.eval_runner

      - name: Cache OPA binary
        uses: actions/cache@v4
        id: opa-cache
        with:
          path: ~/.local/bin/opa
          key: opa-${{ env.OPA_VERSION }}-linux-amd64

      - name: Install OPA
        if: steps.opa-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fSL -o "$HOME/.local/bin/opa" \
            "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x "$HOME/.local/bin/opa"

      - name: Add OPA to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: OPA smoke (all plans)
        run: |
          for plan in configs/mission_plans/*.yaml; do
            bash scripts/opa_smoke.sh "$plan"
          done

      - name: Argo smoke (Python sanity only)
        run: |
          for plan in configs/mission_plans/*.yaml; do
            bash scripts/argo_smoke.sh "$plan"
          done
