apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: orbital-gpu-cpu-fallback-demo
spec:
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: preprocess
            template: preprocess
        - - name: gpu-preferred-detect
            template: gpu-preferred-detect
        - - name: postprocess
            template: postprocess
    - name: preprocess
      container:
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        command: ["/bin/sh", "-c"]
        args: ["echo preprocess"]
    - name: gpu-preferred-detect
      metadata:
        annotations:
          orbital/resource-class: gpu
          orbital/fallback-resource-class: cpu
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: accelerator
                    operator: In
                    values: ["nvidia"]
      container:
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ -e /dev/nvidia0 ]; then
              echo gpu-path
            else
              echo cpu-fallback
            fi
        env:
          - name: ORBITAL_RESOURCE_CLASS
            value: gpu
          - name: ORBITAL_FALLBACK_RESOURCE_CLASS
            value: cpu
    - name: postprocess
      container:
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        command: ["/bin/sh", "-c"]
        args: ["echo postprocess"]
